<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 태그 실습</title>
</head>
<body>

    <h1>이미지 태그 실습</h1>

    <h2>1. 기본 이미지 출력</h2>
    <img src="../images/ball.png" alt="축구공 이미지">

    <hr>

    <h2>2. 배경 이미지 출력</h2>
    <img src="../images/bg.png" alt="겨울 배경 이미지">

    <hr>

    <h2>3. 크기 지정 이미지</h2>
    <img src="../images/desert.jpg" alt="사막 이미지" width="500">

    <hr>

    <h2>4. 꽃 이미지 목록</h2>
    <img src="../images/flower1.jpg" alt="꽃 이미지 1" width="250">
    <img src="../images/flower2.jpg" alt="꽃 이미지 2" width="250">
    <img src="../images/flower3.jpg" alt="꽃 이미지 3" width="250">
    <img src="../images/flower4.jpg" alt="꽃 이미지 4" width="250">

    <hr>

    <h2>5. 패턴 이미지</h2>
    <img src="../images/pattern.jpg" alt="패턴 이미지" width="300">

    <hr>

    <h2>6. 바다 슬라이드 이미지</h2>
    <img src="../images/slide1.jpg" alt="바다 이미지 1" width="400">
    <br><br>
    <img src="../images/slide2.jpg" alt="바다 이미지 2" width="400">
    <br><br>
    <img src="../images/slide3.jpg" alt="바다 이미지 3" width="400">

    <hr>

    <h2>7. 이미지에 설명 붙이기</h2>

    <figure>
        <img src="../images/desert.jpg" alt="사막 풍경" width="400">
        <figcaption>사막 풍경 이미지입니다.</figcaption>
    </figure>

    <figure>
        <img src="../images/flower4.jpg" alt="해바라기" width="400">
        <figcaption>파란 하늘 아래 해바라기 이미지입니다.</figcaption>
    </figure>

    <hr>

    <h2>8. 이미지를 클릭하면 이동</h2>
    <a href="https://www.naver.com">
        <img src="../images/ball.png" alt="네이버로 이동하는 축구공 이미지" width="100">
    </a>

</body>
</html>
