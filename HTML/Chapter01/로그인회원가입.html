<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입 폼 실습</title>
</head>
<body>

    <h1>입력양식 태그 실습</h1>

    <hr>

    <!-- 로그인 폼 -->
    <h2>1. 로그인 폼</h2>

    <form action="#" method="post">

        <fieldset>
            <legend>로그인</legend>

            <p>
                <label for="loginId">아이디</label>
                <input type="text" id="loginId" name="loginId" placeholder="아이디 입력" required>
            </p>

            <p>
                <label for="loginPw">비밀번호</label>
                <input type="password" id="loginPw" name="loginPw" placeholder="비밀번호 입력" required>
            </p>

            <p>
                <input type="checkbox" id="rememberId" name="rememberId">
                <label for="rememberId">아이디 저장</label>
            </p>

            <p>
                <button type="submit">로그인</button>
                <button type="reset">초기화</button>
            </p>

        </fieldset>

    </form>

    <br>
    <hr>
    <br>

    <!-- 회원가입 폼 -->
    <h2>2. 회원가입 폼</h2>

    <form action="#" method="post">

        <fieldset>
            <legend>회원가입</legend>

            <p>
                <label for="userId">아이디</label>
                <input type="text" id="userId" name="userId" placeholder="아이디 입력" required>
                <button type="button">중복확인</button>
            </p>

            <p>
                <label for="userPw">비밀번호</label>
                <input type="password" id="userPw" name="userPw" placeholder="비밀번호 입력" required>
            </p>

            <p>
                <label for="userPwCheck">비밀번호 확인</label>
                <input type="password" id="userPwCheck" name="userPwCheck" placeholder="비밀번호 재입력" required>
            </p>

            <p>
                <label for="userName">이름</label>
                <input type="text" id="userName" name="userName" placeholder="이름 입력" required>
            </p>

            <p>
                <label for="birth">생년월일</label>
                <input type="date" id="birth" name="birth">
            </p>

            <p>
                성별
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">남자</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">여자</label>

                <input type="radio" id="none" name="gender" value="none" checked>
                <label for="none">선택 안 함</label>
            </p>

            <p>
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
            </p>

            <p>
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678">
            </p>

            <p>
                <label for="address">주소</label>
                <input type="text" id="address" name="address" placeholder="주소 입력" size="50">
            </p>

            <p>
                <label for="job">직업</label>
                <select id="job" name="job">
                    <option value="">직업 선택</option>
                    <option value="student">학생</option>
                    <option value="developer">개발자</option>
                    <option value="designer">디자이너</option>
                    <option value="teacher">강사</option>
                    <option value="etc">기타</option>
                </select>
            </p>

            <p>
                관심 분야
                <input type="checkbox" id="html" name="interest" value="html">
                <label for="html">HTML</label>

                <input type="checkbox" id="css" name="interest" value="css">
                <label for="css">CSS</label>

                <input type="checkbox" id="java" name="interest" value="java">
                <label for="java">Java</label>

                <input type="checkbox" id="sql" name="interest" value="sql">
                <label for="sql">SQL</label>
            </p>

            <p>
                <label for="profile">프로필 사진</label>
                <input type="file" id="profile" name="profile">
            </p>

            <p>
                <label for="intro">자기소개</label>
                <br>
                <textarea id="intro" name="intro" rows="5" cols="60" placeholder="자기소개를 입력하세요"></textarea>
            </p>

            <p>
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">이용약관에 동의합니다.</label>
            </p>

            <p>
                <button type="submit">회원가입</button>
                <button type="reset">다시작성</button>
            </p>

        </fieldset>

    </form>

</body>
</html>
