<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 속성 실습</title>

    <style>
        /* 공통 스타일 */
        section {
            width: 800px;
            height: 250px;
            border: 2px solid black;
            margin-bottom: 30px;
            background-color: #eee;

            /* 플렉스 시작 */
            display: flex;
        }

        section > div {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            box-sizing: border-box;
            background-color: orange;

            font-size: 30px;
            font-weight: bold;

            /* 숫자 가운데 정렬 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ------------------------------------------------ */
        /* 1. 주축 정렬 연습 : justify-content */
        #container1 {
            justify-content: space-space-around;
        }

        /* 
            justify-content 종류
            flex-start      : 왼쪽 정렬
            flex-end        : 오른쪽 정렬
            center          : 가운데 정렬
            space-between   : 양끝 배치 후 사이 간격 동일
            space-around    : 각 요소 주변 간격 동일
            space-evenly    : 모든 간격 완전히 동일
        */


        /* ------------------------------------------------ */
        /* 2. 교차축 정렬 연습 : align-items */
        #container2 {
            justify-content: center;
            align-items: center;
        }

        /* 
            align-items 종류
            stretch     : 세로로 늘어남, 기본값
            flex-start  : 위쪽 정렬
            flex-end    : 아래쪽 정렬
            center      : 세로 가운데 정렬
        */


        /* ------------------------------------------------ */
        /* 3. 배치 방향 연습 : flex-direction */
        #container3 > div {
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 
            flex-direction 종류
            row             : 가로 방향, 기본값
            row-reverse     : 가로 역방향
            column          : 세로 방향
            column-reverse  : 세로 역방향
        */
    </style>
</head>

<body>

    <h2>1. justify-content 연습</h2>
    <section id="container1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </section>


    <h2>2. align-items 연습</h2>
    <section id="container2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </section>


    <h2>3. flex-direction 연습</h2>
    <section id="container3">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </section>

</body>

</html>
