<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 위치 속성 실습</title>

    <style>
        /* 기본 설정 */
        * {
            box-sizing: border-box;
        }

        body {
            height: 2000px;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        section {
            width: 500px;
            height: 220px;
            margin: 30px auto;
            border: 2px solid black;
            padding: 20px;
        }

        section > h2 {
            margin-top: 0;
        }

        .box {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
        }

        /* 1. static : 기본값 */
        .box1 .item {
            position: static;
            background-color: lightcoral;
        }

        /* 2. relative : 원래 위치 기준으로 이동 */
        .box2 .item {
            position: relative;
            left: 50px;
            top: 20px;
            background-color: lightblue;
        }

        /* 3. absolute : 가장 가까운 position 부모 기준 */
        .box3 {
            position: relative;
        }

        .box3 .item {
            position: absolute;
            right: 20px;
            bottom: 20px;
            background-color: lightgreen;
        }

        /* 4. fixed : 브라우저 화면 기준으로 고정 */
        .fixed-box {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 120px;
            height: 60px;
            background-color: gold;
            border: 2px solid black;
            text-align: center;
            line-height: 60px;
            font-weight: bold;
        }

        /* 5. sticky : 특정 위치까지는 일반 배치, 도달하면 고정 */
        .sticky-title {
            position: sticky;
            top: 0;
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="sticky-title">
        position: sticky 실습 - 스크롤하면 위에 붙음
    </div>

    <h1>CSS 위치 속성 position 실습</h1>

    <!-- 1. static -->
    <section class="box1">
        <h2>1. position: static</h2>
        <p>기본 배치 상태이다. left, top을 줘도 움직이지 않는다.</p>
        <div class="box item">static</div>
    </section>

    <!-- 2. relative -->
    <section class="box2">
        <h2>2. position: relative</h2>
        <p>원래 있던 위치를 기준으로 이동한다.</p>
        <div class="box item">relative</div>
    </section>

    <!-- 3. absolute -->
    <section class="box3">
        <h2>3. position: absolute</h2>
        <p>부모 요소를 기준으로 원하는 위치에 배치한다.</p>
        <div class="box item">absolute</div>
    </section>

    <!-- fixed -->
    <div class="fixed-box">
        fixed
    </div>

</body>

</html>
