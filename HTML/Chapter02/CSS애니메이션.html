<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 애니메이션 실습</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
        }

        h2 {
            margin-bottom: 20px;
        }

        section {
            width: 900px;
            margin: 0 auto 40px;
            padding: 30px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .box-area {
            display: flex;
            gap: 30px;
            align-items: center;
            min-height: 150px;
        }

        /* =================================================
           1. transition 실습
        ================================================= */

        .transition-box {
            width: 120px;
            height: 120px;
            background: orange;
            border-radius: 10px;

            /* 변화가 0.5초 동안 부드럽게 적용 */
            transition: all 0.5s;
        }

        .transition-box:hover {
            background: tomato;
            transform: translateY(-20px) rotate(10deg) scale(1.1);
            border-radius: 50%;
        }


        /* =================================================
           2. 좌우 이동 애니메이션
        ================================================= */

        .move-box {
            width: 100px;
            height: 100px;
            background: dodgerblue;
            border-radius: 10px;

            animation: moveLeftRight 2s infinite alternate;
        }

        @keyframes moveLeftRight {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(500px);
            }
        }


        /* =================================================
           3. 통통 튀는 공 애니메이션
        ================================================= */

        .ball {
            width: 90px;
            height: 90px;
            background: crimson;
            border-radius: 50%;

            animation: bounce 0.8s infinite alternate ease-in;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-80px);
            }
        }


        /* =================================================
           4. 빙글빙글 회전 애니메이션
        ================================================= */

        .rotate-box {
            width: 110px;
            height: 110px;
            background: mediumseagreen;
            border-radius: 15px;

            animation: rotateBox 2s infinite linear;
        }

        @keyframes rotateBox {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }


        /* =================================================
           5. 색상 변화 애니메이션
        ================================================= */

        .color-box {
            width: 130px;
            height: 130px;
            border-radius: 10px;

            animation: changeColor 3s infinite;
        }

        @keyframes changeColor {
            0% {
                background: red;
            }

            25% {
                background: orange;
            }

            50% {
                background: yellow;
            }

            75% {
                background: green;
            }

            100% {
                background: blue;
            }
        }


        /* =================================================
           6. 커졌다 작아지는 pulse 애니메이션
        ================================================= */

        .pulse-box {
            width: 120px;
            height: 120px;
            background: purple;
            border-radius: 50%;

            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }


        /* =================================================
           7. 로딩 점 애니메이션
        ================================================= */

        .loading {
            display: flex;
            gap: 12px;
        }

        .loading span {
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%;

            animation: loadingDot 0.8s infinite alternate;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes loadingDot {
            from {
                transform: translateY(0);
                opacity: 0.3;
            }

            to {
                transform: translateY(-25px);
                opacity: 1;
            }
        }


        /* =================================================
           8. 버튼 흔들기 애니메이션
        ================================================= */

        .shake-btn {
            width: 180px;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: #222;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .shake-btn:hover {
            animation: shake 0.4s infinite;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }

            100% {
                transform: translateX(0);
            }
        }

    </style>
</head>
<body>

    <h1>CSS 애니메이션 실습</h1>


    <section>
        <h2>1. transition : 마우스를 올리면 부드럽게 변화</h2>
        <div class="box-area">
            <div class="transition-box"></div>
        </div>
    </section>


    <section>
        <h2>2. animation : 좌우 이동</h2>
        <div class="box-area">
            <div class="move-box"></div>
        </div>
    </section>


    <section>
        <h2>3. animation : 통통 튀는 공</h2>
        <div class="box-area">
            <div class="ball"></div>
        </div>
    </section>


    <section>
        <h2>4. animation : 계속 회전</h2>
        <div class="box-area">
            <div class="rotate-box"></div>
        </div>
    </section>


    <section>
        <h2>5. animation : 배경색 변화</h2>
        <div class="box-area">
            <div class="color-box"></div>
        </div>
    </section>


    <section>
        <h2>6. animation : 커졌다 작아지는 효과</h2>
        <div class="box-area">
            <div class="pulse-box"></div>
        </div>
    </section>


    <section>
        <h2>7. animation-delay : 로딩 점 만들기</h2>
        <div class="box-area">
            <div class="loading">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </section>


    <section>
        <h2>8. hover + animation : 흔들리는 버튼</h2>
        <div class="box-area">
            <button class="shake-btn">마우스 올려봐</button>
        </div>
    </section>

</body>
</html>
