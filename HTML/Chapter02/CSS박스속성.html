<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* width , heigth */
        div {
            display: inline-block;
            width: 100px;
            height: 100px;
            background: orange;
        }

        section:nth-of-type(1)>div:nth-child(1) {
            display: inline-block;
            width: 50px;
            height: 50px;
        }

        section:nth-of-type(1)>div:nth-child(2) {
            display: inline-block;
            width: 10%;
            height: 50px;
        }

        section:nth-of-type(1)>div:nth-child(3) {
            display: inline-block;
            width: 10%;
            height: 50%;
        }


        section:nth-of-type(2)>div:nth-child(1) {
            display: inline-block;
            width: 10%;
            height: 50%;
            margin: 28px;
            padding: 10px 20px 30px 40px;

        }

        section:nth-of-type(2)>div:nth-child(3) {
            display: inline-block;
            width: 10%;
            height: 50%;
            margin: 10px 20px 30px 40px;
            padding: 10px 20px 30px 40px;
        }


        section:nth-of-type(2)>div:nth-child(3) {
            display: inline-block;
            width: 10%;
            height: 50%;
        }



        section:nth-of-type(3)>div:nth-child(2) {
            display: inline-block;
            width: 200px;
            height: 200px;
            margin-top: 10px;
            margin-left: 22px;
            padding: 10px 20px 30px 40px;

        }


        section:nth-of-type(3)>div:nth-child(3) {
            display: block;
            margin: 10px auto;


        }

        section:nth-of-type(4)>div:nth-child(1) {
            display: block;

            border: 10px solid red;
        }

        section:nth-of-type(4)>div:nth-child(2) {
            border: 10px dashed blue;
        }

        section:nth-of-type(4)>div:nth-child(3) {
            border: 10px dotted green;
        }

        section:nth-of-type(4)>div:nth-child(4) {
             width: 200px;
            height: 200px;
            border: 55px solid  black;
              box-sizing: border-box;
              margin: 22px;
              padding: 40px;


        }
        section:nth-of-type(5)>div:nth-child(4) {
            width: 100px;
            height: 200px;
            border: 20px; white-space: inherit;
            box-sizing: border-box;

        }        
    </style>
</head>

<body>

    <h3>박스속성</h3>
    <h4>width , height</h4>


    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>

    <h3>margin padding</h3>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>

    <h3>박스속성1</h3>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>


    <h3>박스속성2</h3>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </section>


    <h3>box 사이징</h3>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </section>


</body>

</html>
